---

- name: set variable for rules 
  ansible.builtin.include_vars: 
    file: vars/survey_acls.yml
  when: fw_survey
  tags: [rule]

- name: read variable for rules from Excel file
  set_fact:
    fw_rules: "{{ lookup('rules', 'files/rules2.xlsx') }}"
  tags: [excel]

- name: yaml to json
  debug:
    msg: "{{ fw_rules | to_nice_json }}"
  tags: [debug]

- include_tasks: srx/main.yml
  when: inventory_hostname in groups['srx']
  tags: [always]

- include_tasks: panos/main.yml
  when: inventory_hostname in groups['panos']
  tags: [always]

- include_tasks: fortigate/main.yml
  when: inventory_hostname in groups['fg']
  tags: [always]

- include_tasks: asa/main.yml
  when: inventory_hostname in groups['asa']
  tags: [always]

